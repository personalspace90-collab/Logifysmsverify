<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logify SMS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-gray-100 font-sans min-h-screen flex flex-col justify-between">

  <header class="border-b border-gray-800 p-4 bg-[#111827]">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-wider text-indigo-400">LOGIFY <span class="text-xs text-gray-500">v1.0</span></h1>
      <span class="px-2 py-1 text-xs rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">System Online</span>
    </div>
  </header>

  <main class="max-w-md w-full mx-auto p-4 flex-grow flex flex-col justify-center space-y-6">
    
    <div class="bg-[#111827] border border-gray-800 rounded-2xl p-6 shadow-xl">
      <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Your Virtual Number</p>
      <div class="text-2xl font-mono font-bold text-white tracking-wide mb-4" id="phone-number">
        +1 (555) 000-0000
      </div>
      <div class="flex items-center space-x-2 text-sm text-amber-400" id="status-badge">
        <span class="h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span>
        <span>Awaiting incoming verification SMS...</span>
      </div>
    </div>

    <div class="bg-[#1F2937]/50 border border-dashed border-gray-700 rounded-2xl p-8 text-center flex flex-col items-center justify-center min-h-[160px]">
      <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Verification Code</p>
      <div id="otp-display" class="text-4xl font-black tracking-widest text-gray-600 font-mono">
        ------
      </div>
      <p id="sms-body" class="text-sm text-gray-400 mt-3 italic max-w-xs hidden">"Your activation code is..."</p>
    </div>

  </main>

  <footer class="p-4 text-center text-xs text-gray-600 border-t border-gray-900 bg-[#0B0F19]">
    Logify Digital Terminal Integration Platform
  </footer>

  <script>
    // Paste your real Twilio Trial number here to display it on your UI
    const testNumber = "PASTE_YOUR_TWILIO_NUMBER_HERE"; 
    document.getElementById('phone-number').innerText = testNumber;

    // This function simulates checking your database endpoint
    async function checkIncomingSMS() {
      console.log("Checking database for new SMS messages...");
      
      // Temporary manual test trigger:
      // In production, fetch() goes here to look up data from Supabase
    }

    // Check for changes automatically every 4 seconds (Polling)
    setInterval(checkIncomingSMS, 4000);
  </script>
</body>
</html>
